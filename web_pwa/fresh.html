<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7fa24d" />
    <title>更新登山離線地圖</title>
    <style>
      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #7fa24d;
        color: #1f563d;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(320px, calc(100vw - 32px));
        padding: 18px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        color: #5d665c;
        font-size: 0.92rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在更新</h1>
      <p>清除舊版快取後會自動開啟新版。</p>
    </main>
    <script>
      (async () => {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        window.location.replace('/?v=38');
      })().catch(() => {
        window.location.replace('/?v=38');
      });
    </script>
  </body>
</html>
