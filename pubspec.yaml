name: hiking_offline_map_app
description: Offline hiking map app prototype with MapLibre, GPX parsing, GPS tracking, and MBTiles management.
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  geolocator: ^14.0.2
  maplibre_gl: ^0.26.1
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.42
  xml: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/map_styles/
