<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6f8f45" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="登山離線地圖" />
    <title>登山離線地圖</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="stylesheet" href="styles.css?v=17" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-stage" aria-label="魯地圖">
        <canvas id="mapCanvas" width="900" height="900"></canvas>
        <div class="gps-dot" id="gpsDot" hidden></div>
        <div class="status-pill" id="safetyStatus">準備載入地圖</div>
        <button class="icon-button" id="installButton" type="button" title="安裝" hidden>
          <span aria-hidden="true">↓</span>
        </button>
      </section>

      <section class="controls" aria-label="地圖操作">
        <label class="file-button">
          <input id="mapInput" type="file" accept=".mbtiles,.map,.sqlite,.db,application/octet-stream,application/vnd.sqlite3" />
          匯入圖
        </label>
        <label class="file-button">
          <input id="gpxInput" type="file" accept=".gpx,application/gpx+xml,text/xml" />
          匯入 GPX
        </label>
        <button id="demoButton" type="button">示範</button>
        <button id="trackingButton" type="button">定位</button>
        <button id="clearButton" type="button">清除</button>
      </section>

      <section class="metrics" aria-label="狀態">
        <div>
          <span>軌跡</span>
          <strong id="trackCount">0</strong>
        </div>
        <div>
          <span>航點</span>
          <strong id="waypointCount">0</strong>
        </div>
        <div>
          <span>偏離</span>
          <strong id="deviationDistance">--</strong>
        </div>
      </section>

      <section class="panel map-package" aria-label="圖資狀態">
        <div class="panel-heading">
          <h2>圖資</h2>
          <span id="mapName">尚未匯入</span>
        </div>
        <dl class="map-meta" id="mapMeta">
          <div><dt>格式</dt><dd>--</dd></div>
          <div><dt>縮放</dt><dd>--</dd></div>
          <div><dt>圖磚</dt><dd>--</dd></div>
        </dl>
        <p id="mapStatus" class="helper-text">可匯入 raster MBTiles 顯示魯地圖底圖。</p>
      </section>

      <section class="panel departure-check" aria-label="出發檢查">
        <div class="panel-heading">
          <h2>出發檢查</h2>
          <span id="readyCount">0/5</span>
        </div>
        <ul class="check-list">
          <li data-check="secure"><span></span><strong>HTTPS</strong><em>確認中</em></li>
          <li data-check="offline"><span></span><strong>離線</strong><em>等待</em></li>
          <li data-check="map"><span></span><strong>圖資</strong><em>未匯入</em></li>
          <li data-check="gpx"><span></span><strong>GPX</strong><em>未載入</em></li>
          <li data-check="gps"><span></span><strong>定位</strong><em>未啟動</em></li>
        </ul>
      </section>

      <section class="panel waypoint-panel" aria-label="航點">
        <div class="panel-heading">
          <h2>航點</h2>
          <span id="routeName">尚未載入路線</span>
        </div>
        <ul id="waypointList" class="waypoint-list"></ul>
      </section>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="app.js?v=17" type="module"></script>
  </body>
</html>
